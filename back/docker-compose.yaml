version: "3"
services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    volumes:
      - ./data:/var/lib/postgresql/data
    command: [postgres, -c, "listen_addresses=*", -c, log_statement=all]
    healthcheck:
      test: [CMD-SHELL, pg_isready -q -U postgres]
      interval: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1024M

  redis:
    image: "redis:7-alpine"
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - ./redis-data:/var/lib/redis
    environment:
      - REDIS_REPLICATION_MODE=master
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    healthcheck:
      # redis поднят с requirepass — ping без авторизации вернёт NOAUTH,
      # поэтому авторизуемся (env REDIS_PASSWORD доступен внутри контейнера).
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 524M

  express-app:
    # На сервере подставляется готовый образ из CI ($TAG_COMMIT) через API_IMAGE.
    # Локально (без API_IMAGE) собирается из Dockerfile и тегается digital-api:latest.
    image: ${API_IMAGE:-digital-api:latest}
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    container_name: digital-api
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      APPNAME: ${APPNAME}
      PORT: ${PORT}
      NODE_ENV: prod
      LOCALE: true
      PRODUCTION_URL: ${PRODUCTION_URL}
      LOGIN_RATE_LIMITER_ATTEMPTS: ${LOGIN_RATE_LIMITER_ATTEMPTS}
      LOGIN_RATE_LIMITER_TIMER_M: ${LOGIN_RATE_LIMITER_TIMER_M}
      CLIENT_BASE_URL: ${CLIENT_BASE_URL}
      DATABASE_HOST: db
      DATABASE_PORT: ${DATABASE_PORT}
      DATABASE_USER: ${DATABASE_USER}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      DATABASE_NAME: ${DATABASE_NAME}
      DATABASE_URL: postgresql://${DATABASE_USER}:${DATABASE_PASSWORD}@db:${DATABASE_PORT}/${DATABASE_NAME}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      ACCESS_TOKEN_EXPIRES_IN: ${ACCESS_TOKEN_EXPIRES_IN}
      REFRESH_TOKEN_EXPIRES_IN: ${REFRESH_TOKEN_EXPIRES_IN}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      BUCKET_KEY: ${BUCKET_KEY}
      BUCKET_SECRET: ${BUCKET_SECRET}
      BUCKET_ENDPOINT: ${BUCKET_ENDPOINT}
      BUCKET_NAME: ${BUCKET_NAME}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_USER: ${MAIL_USER}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_FROM: ${MAIL_FROM}
      MAIL_PORT: ${MAIL_PORT}
      YANDEX_CLIENT_ID: ${YANDEX_CLIENT_ID}
      YANDEX_CLIENT_SECRET: ${YANDEX_CLIENT_SECRET}
      YANDEX_BASE_URL: ${YANDEX_BASE_URL}
      YANDEX_LOGIN_URL: ${YANDEX_LOGIN_URL}
      GIGACHAT_CREDENTIALS: ${GIGACHAT_CREDENTIALS}
      GIGACHAT_MODEL: ${GIGACHAT_MODEL}
    command: sh -c "npm run migrate:prod && npm run seed:prod && npm run start"
    deploy:
      resources:
        limits:
          cpus: "3"
          memory: 2048M
