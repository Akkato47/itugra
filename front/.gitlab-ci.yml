variables:
  DOCKER_HOST: tcp://docker:2375
  DOCKER_TLS_CERTDIR: ""
  DOCKER_DRIVER: overlay2
  # Define default environment names
  DEV_ENVIRONMENT_NAME: "development"
  STAGE_ENVIRONMENT_NAME: "stage"
  PROD_ENVIRONMENT_NAME: "production"

services:
  - name: docker:dind
    command: ["--tls=false", "--host=tcp://0.0.0.0:2375"]

stages:
  - build
  - deploy

workflow:
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      variables:
        ENVIRONMENT_NAME: $PROD_ENVIRONMENT_NAME
        HOST: "igniz.ru"
    - if: $CI_COMMIT_BRANCH == "stage"
      variables:
        ENVIRONMENT_NAME: $STAGE_ENVIRONMENT_NAME
        HOST: "igniz.ru"

build:
  image: docker:24.0
  stage: build
  environment:
    name: $ENVIRONMENT_NAME
    url: https://$HOST
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "stage"
  script:
    - docker info
    - echo "$DOCKER_HUB_PASSWORD" | docker login -u "$DOCKER_HUB_USER" --password-stdin
    - docker build -t $TAG_COMMIT -t $TAG_LATEST .
    - docker push $TAG_COMMIT
    - docker push $TAG_LATEST

deploy:
  image: docker:24.0
  stage: deploy
  environment:
    name: $ENVIRONMENT_NAME
    url: https://$HOST
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
  script:
    - echo "$DOCKER_HUB_PASSWORD" | docker login -u "$DOCKER_HUB_USER" --password-stdin
    - docker pull $TAG_COMMIT
    - docker container rm -f $IMGNAME || true
    - docker run -d --restart unless-stopped -p 5173:5173 --name $IMGNAME $TAG_COMMIT